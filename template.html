<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus</title>
    <style>{{ .Css }}</style>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.0/css/all.css" lang="text/css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,300,700,400italic,700italic,900" lang="text/css">
</head>
<body>
    <header>
        <div>
            <h1>Olympus</h1>
        </div>
    </header>
    <main>
        <div id="systems">
            {{ range .Links }}
                <a href="{{ .URL }}">
                    <img style="{{ .IconStyle }}" src="{{ .Icon }}">
                    <div>
                        <h3 style="color: {{ .Color }}">{{ .Name }}</h3>
                        <p>{{ .Description }}</p>
                    </div>
                </a>
            {{ end }}
        </div>
    </main>
</body>
</html>
